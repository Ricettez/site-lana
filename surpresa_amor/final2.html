<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para você ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7aa2,#ffb6c1);
font-family:Arial;
overflow:hidden;
}

/* botão inicial */

#botao{
padding:18px 35px;
font-size:26px;
border:none;
border-radius:15px;
background:white;
color:#ff4d6d;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
transition:0.3s;
}

#botao:hover{
transform:scale(1.08);
}

/* container da surpresa */

.container{
position:absolute;
text-align:center;
display:none;
flex-direction:column;
align-items:center;
}

/* imagem */

img{
width:65vmin;
height:65vmin;
object-fit:cover;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
margin-bottom:25px;
animation:zoom 6s ease infinite alternate;
}

/* frase */

.frase{
font-size:32px;
color:white;
font-weight:bold;
max-width:700px;
line-height:1.4;
animation:aparecer 2s ease;
}

/* animações */

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* corações */

.coracao{
position:absolute;
font-size:30px;
pointer-events:none;
animation:voar 3s ease-out forwards;
}

@keyframes voar{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(0.3);
opacity:0;
}
}

</style>
</head>

<body>

<button id="botao" onclick="explodir()">
clique aqui ❤️
</button>

<div class="container" id="conteudo">

<img src="arte.jpg">

<div class="frase">
feliz dia das mulheres meu bem ❤️ <br><br>
você é especial pra mim <br>
e eu quero mostrar isso todos os dias
</div>

</div>

<script>

function explodir(){

document.getElementById("botao").style.display="none";

for(let i=0;i<120;i++){

const coracao=document.createElement("div");

coracao.className="coracao";
coracao.innerHTML="❤️";

coracao.style.left="50vw";
coracao.style.top="50vh";

const x=(Math.random()*800-400)+"px";
const y=(Math.random()*800-400)+"px";

coracao.style.setProperty("--x",x);
coracao.style.setProperty("--y",y);

coracao.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(coracao);

setTimeout(()=>{
coracao.remove();
},3000);

}

setTimeout(()=>{
document.getElementById("conteudo").style.display="flex";
},1200);

}

</script>

</body>
</html>

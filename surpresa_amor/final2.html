<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Você ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7aa2,#ffb6c1);
font-family:Arial;
overflow:hidden;
}

.container{
text-align:center;
color:white;
animation: aparecer 2s ease;
max-width:700px;
}

h1{
font-size:50px;
margin-bottom:20px;
}

p{
font-size:26px;
line-height:1.5;
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}

/* corações subindo */

.coracao{
position:absolute;
bottom:-50px;
font-size:30px;
animation: subir 8s linear infinite;
}

@keyframes subir{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Feliz Dia das Mulheres ❤️</h1>

<p>
feliz dia das mulheres meu bem ❤️  
você é especial pra mim  
e eu quero mostrar isso todos os dias
</p>

</div>

<script>

/* cria corações animados */

function criarCoracao(){
const coracao = document.createElement("div");

coracao.classList.add("coracao");
coracao.innerHTML = "❤️";

coracao.style.left = Math.random() * 100 + "vw";
coracao.style.fontSize = (20 + Math.random()*30) + "px";

document.body.appendChild(coracao);

setTimeout(()=>{
coracao.remove();
},8000);
}

setInterval(criarCoracao,500);

</script>

</body>
</html>

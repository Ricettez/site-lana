<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
    body{
opacity:0;
animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:360px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

p{
    font-size:18px;
    color:#333;
}

#contador{
    font-weight:bold;
    margin-top:10px;
    color:#ff4d6d;
}

button{
   button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover{
transform: translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
}

button:hover{
    background:#ff1e4d;
}

.coracao{
    font-size:30px;
    animation:bater 1s infinite;
}

@keyframes bater{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="card">

<div class="coracao">❤️</div>

<h1>Para Você</h1>

<p>
Desde que você entrou na minha vida, tudo ficou mais bonito.
Seu sorriso ilumina meus dias e eu sou muito feliz por ter você.
</p>

<p>Eu te amo há:</p>

<div id="contador"></div>

<button onclick="abrirFotos()">
Ver nossas memórias 📸
</button>

</div>

<script>

const inicio = new Date("2023-03-23T00:00:00");

function atualizarContador(){

const agora = new Date();

let diff = agora - inicio;

let dias = Math.floor(diff / (1000*60*60*24));
let horas = Math.floor((diff / (1000*60*60)) % 24);
let minutos = Math.floor((diff / (1000*60)) % 60);
let segundos = Math.floor((diff / 1000) % 60);

document.getElementById("contador").innerHTML =
dias + " dias " +
horas + " horas " +
minutos + " minutos " +
segundos + " segundos ❤️";

}

setInterval(atualizarContador,1000);

function abrirFotos(){
window.location.href = "fotos.html";
}

</script>

</body>
</html>

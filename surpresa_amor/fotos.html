<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nossas Memórias ❤️</title>

<style>

body{
margin:0;
background:#ffe4e9;
font-family:Arial;
text-align:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

min-height:100vh;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
gap:20px;
max-width:900px;
}

h1{
    padding:20px;
    color:#ff4d6d;
}

.mensagem{
    font-size:26px;
    color:#ff1e4d;
    margin-bottom:20px;
    font-weight:bold;
}


.galeria img{
width:250px;
height:200px;
object-fit:cover;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.galeria img:hover{
transform:scale(1.07);
box-shadow:0 12px 25px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<h1>Minhas Saudades 📸❤️</h1>

<div class="mensagem">
me deixa cuidar de você pra sempre? ❤️
</div>

<div class="galeria">

<img src="foto3.jpg">
<img src="foto4.jpg">

</button>

</div>

</body>

</html>
